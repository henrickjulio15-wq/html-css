<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Desafio das Tags</h1>
    <p>Em HTML5 podemos utilizar tags para quando passamos o mouse sobre elas aparece um pop-up ver logo embaixo</p>
    <ul>
        <li><abbr title=" p ">PARAGRAFOS</abbr></li>
        <li><abbr title=" h1 ou h2 dependendo do nível de hierarquia">TITULOS</abbr></li>
        <li><abbr title=" img ">IMAGENS</abbr></li>
        <li><abbr title=" abbr justamente a que estou usando">ABREVIAÇÕES</abbr></li>
        <li><abbr title=" code para o codigo fica certo no site">CODIGO-FONTE</abbr></li>
        <li><abbr title=" ol seria uma lista por ordem">LISTAS NUMERADAS</abbr></li>
        <li><abbr title=" ul seria uma lista com marcadores">LISTAS COM DESMARCADORES</abbr></li>
    </ul>
</body>
</html>
