<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texto escondido</title>
    <style>
        div:hover
        {
            color: red;
            background-color: aqua;
            width: 200px;
        }
        div p
        {
            display: none;
            color: blue;
        }
        div:hover p
        {
            display: block;
        }
    </style>
</head>
<body>
    <p>passe o mause encima</p>
    <div>olhe o texto embaixo
        <p>Este é o texto escondido</p>
    </div>
    <p>fim do exemplo</p>
    
</body>
</html>
